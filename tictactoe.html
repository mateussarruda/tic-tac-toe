<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="css/tictactoe.css">
    <link rel="stylesheet" href="css/reset.css">
</head>
<body>
    <div class="overlay">
        <div class="reset">
            <p class="winner">Player 1 Win</p>
            <button class="resetBtn">Restart</button>
        </div>
    </div>
    <div class="output">
        <p>Jogador 1: 2 pontos</p>
        <p>Jogador 1: 5 pontos</p>
    </div>
    <div class="tictactoe">
        <button class="place" data-place="1"></button>
        <button class="place" data-place="2"></button>
        <button class="place" data-place="3"></button>
        <button class="place" data-place="4"></button>
        <button class="place" data-place="5"></button>
        <button class="place" data-place="6"></button>
        <button class="place" data-place="7"></button>
        <button class="place" data-place="8"></button>
        <button class="place" data-place="9"></button>
    </div>
    <script src="scripts/actions.js" type="module"></script>
    <script src="scripts/restart.js" type="module"></script>
</body>
</html>
