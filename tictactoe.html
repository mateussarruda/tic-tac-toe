<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="css/tictactoe.css">
</head>
<body>
    <div class="output">
        <p>Jogador 1: 2 pontos</p>
        <p>Jogador 1: 5 pontos</p>
    </div>
    <div class="tictactoe">
        <button class="place" data-place="1">X</button>
        <button class="place" data-place="2">O</button>
        <button class="place" data-place="3">X</button>
        <button class="place" data-place="4">O</button>
        <button class="place" data-place="5">O</button>
        <button class="place" data-place="6">X</button>
        <button class="place" data-place="7">X</button>
        <button class="place" data-place="8">X</button>
        <button class="place" data-place="9">O</button>
    </div>
</body>
</html>
